<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ShopEase | Login</title>
    <link rel="stylesheet" href="login.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
</head>

<body>
    <main class="login-wrapper">
        <section class="login-card" aria-label="Login form">
            <h1 class="login-title">Welcome Back to ShopEase</h1>
            <form id="loginForm" novalidate>
                <div class="input-group">
                    <label for="email" class="input-label">Email address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required
                        autocomplete="username" />
                    <span class="error-message" aria-live="polite"></span>
                </div>

                <div class="password-wrapper">
                    <input type="password" class="form-input" id="password">
                    <span class="toggle-password">Show</span>
                </div>
                <div class="error-message" id="passwordError"></div>
                </div>

                <div class="form-footer">
                    <a href="#" class="forgot-password">Forgot password?</a>
                </div>

                <button type="submit" class="btn-login" aria-label="Login to your account">Login</button>
            </form>

            <p class="signup-redirect">
                Don’t have an account? <a href="signup.html">Create one</a>
            </p>
        </section>
    </main>

    <script src="login.js"></script>
</body>

</html>
